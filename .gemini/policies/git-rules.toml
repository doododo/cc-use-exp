# 针对内置 Shell 工具的放行
[[rule]]
toolName = "run_shell_command"
commandPrefix = "git diff"
decision = "allow"
priority = 200
description = "全局允许 run_shell_command 执行 git diff 系列命令"

[[rule]]
toolName = "shell"
commandPrefix = "git diff"
decision = "allow"
priority = 200
description = "全局允许 shell 插件执行 git diff 系列命令"

# 针对其他 Git 只读命令的放行
[[rule]]
toolName = "run_shell_command"
commandPrefix = "git status"
decision = "allow"
priority = 200

[[rule]]
toolName = "run_shell_command"
commandPrefix = "git log"
decision = "allow"
priority = 200

[[rule]]
toolName = "run_shell_command"
commandPrefix = "git branch"
decision = "allow"
priority = 200

# 针对自定义命令 /commit-msg 中 !{} 模板注入的放行
[[rule]]
toolName = "commit-msg"
commandPrefix = "git diff"
decision = "allow"
priority = 210
description = "明确允许 /commit-msg 执行 git diff"

[[rule]]
toolName = "commit_msg"
commandPrefix = "git diff"
decision = "allow"
priority = 210
description = "明确允许 /commit_msg 执行 git diff (兼容下划线)"

[[commands]]
name = "git"
action = "allow"
