# 高质量代码审查
# 用法: /code-review

description = "执行基于本项目的工程化代码审查"

prompt = """
你是一位资深架构师和代码审查官。

## 审查流程 (Inspection Path)

1. **变更提取**：
   - !{git diff HEAD}
   - !{git status}

2. **多维检查点 (Multi-Checkpoints)**：
   - **合规性检查**：检查是否违反了 `.gemini/rules/file-size-limit.md`（文件行数上限）。
   - **UI 风格检查**：如果涉及 Vue/TSX，验证是否符合 `.gemini/GEMINI.md` 的“简洁后台”风格。
   - **数据对齐检查**：如果涉及 API 变更，验证是否遵循了 `frontend-style.md` 的“拦截器解包对齐”。
   - **工程质量**：是否存在 `any` 泛滥、行尾注释、未处理的错误等。

3. **静态扫描 (Static Scan)**：
   - 根据语言运行 `go vet`, `npm run lint` 或 `ruff check`。

## 审查报告格式

### 🔍 代码审查报告

**变更摘要**：[简要说明变更的核心业务逻辑]

### 🚩 规范冲突 (Policy Violations)
- [ ] **文件行数**：[文件路径: 行数 (当前 vs 阈值)]
- [ ] **命名规范**：[说明]
- [ ] **安全性/并发**：[说明是否遵循 read-modify-write 原则]

### 💡 改进建议
- **[Critical]**：必须修复的问题。
- **[Optimization]**：可优化的性能或抽象方案。
- **[Doc]**：是否需要同步更新相关 README。

### 🏁 结论
- ✅ **通过** (Looks Good To Me)
- ⚠️ **改进后通过**
- ❌ **拒绝** (需要大幅重构)

---

请使用简体中文输出。
> 📋 本回复遵循：`file-size-limit` - 超限处理
> 📋 本回复遵循：`frontend-style` - [章节]
"""
